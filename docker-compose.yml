version: '3.8'
services:
  backend:
    build: ./backend
    image: backend-app:latest
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - frontend
  frontend:
    build: ./frontend
    image: frontend-app:latest
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
