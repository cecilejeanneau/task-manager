name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.2"
      - run: pip install pre-commit
      - run: pre-commit run --all-files
      - name: Installer dépendances backend
        run: pip install -r backend/requirements.txt pytest pytest-benchmark pytest-cov httpx
      - name: Lancer les tests backend
        run: PYTHONPATH=backend pytest --cov=backend/app backend/tests
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installer dépendances frontend
        run: |
          cd frontend
          npm install stylelint stylelint-config-standard jest playwright
      - name: Installer ESLint (racine)
        run: npm install --save-dev eslint @eslint/js
      - name: Linter JS
        run: npx eslint --config eslint.config.cjs frontend/app.js
      - name: Linter CSS
        run: cd frontend && npx stylelint styles.css
      - name: Test JS unitaire
        run: cd frontend && npx jest test_app.test.js
      - name: Démarrer le backend
        run: |
          cd backend
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 5
      - name: Démarrer le serveur frontend
        run: |
          cd frontend
          nohup python3 -m http.server 5173 &
          sleep 3
      - name: Installer les navigateurs Playwright
        run: cd frontend && npx playwright install
      - name: Test E2E Playwright
        run: cd frontend && npx playwright test e2e.spec.js

      - name: Build Docker image backend
        run: docker build -t backend-app:ci ./backend

      - name: Build Docker image frontend
        run: docker build -t frontend-app:ci ./frontend



      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@97e0b38b7e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2
        with:
          image-ref: backend-app:ci



      - name: Scan frontend image (Trivy)
        uses: aquasecurity/trivy-action@97e0b38b7e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2
        with:
          image-ref: frontend-app:ci

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag & Push backend image
        run: |
          docker tag backend-app:ci ghcr.io/${{ github.repository }}/backend-app:latest
          docker push ghcr.io/${{ github.repository }}/backend-app:latest

      - name: Tag & Push frontend image
        run: |
          docker tag frontend-app:ci ghcr.io/${{ github.repository }}/frontend-app:latest
          docker push ghcr.io/${{ github.repository }}/frontend-app:latest



      - name: Analyse docker-compose (Trivy)
        uses: aquasecurity/trivy-action@97e0b38b7e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2
        with:
          scan-type: 'config'
          scan-ref: 'docker-compose.yml'
